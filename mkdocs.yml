site_name: duratypes
site_description: Typed duration parsing for Pydantic and modern Python apps
site_author: Dillon Barendt
site_url: https://dillon-barendt.github.io/duratypes/

repo_name: dillon-barendt/duratypes
repo_url: https://github.com/dillon-barendt/duratypes
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - API: api.md
  - Behavior: behavior.md
  - Pydantic: pydantic.md
  - Integrations: integrations.md
  - Design: design.md
  - Roadmap: roadmap.md
  - Errors: errors.md
  - Release: release.md
  - Contributing: contributing.md
  - Decisions:
      - Store Durations as Seconds: decisions/0001-store-durations-as-seconds.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
